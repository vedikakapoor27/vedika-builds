<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat with Vedika's Portfolio | AI Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117; color: #e6edf3;
      font-family: 'Inter', sans-serif;
      height: 100vh; display: flex; flex-direction: column;
    }
    .back-btn {
      position: fixed; top: 14px; left: 16px;
      font-family: 'Fira Code', monospace; font-size: 11px;
      color: #8b949e; text-decoration: none;
      background: #161b22; border: 1px solid #30363d;
      padding: 6px 12px; border-radius: 6px;
      transition: all 0.2s; z-index: 10;
    }
    .back-btn:hover { color: #58a6ff; border-color: #58a6ff; }

    .chat-header {
      background: #161b22; border-bottom: 1px solid #30363d;
      padding: 14px 20px 14px 100px;
      display: flex; align-items: center; gap: 12px;
    }
    .chat-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      border: 2px solid #58a6ff; object-fit: cover;
    }
    .chat-header-info h2 { font-size: 15px; color: #e6edf3; }
    .chat-header-info p { font-size: 11px; color: #3fb950; }
    .online-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #3fb950; display: inline-block;
      margin-right: 4px; animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .messages {
      flex: 1; overflow-y: auto;
      padding: 24px 20px; display: flex;
      flex-direction: column; gap: 16px;
      max-width: 760px; width: 100%; margin: 0 auto;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }

    .msg { display: flex; gap: 10px; max-width: 80%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot { align-self: flex-start; }

    .msg-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      flex-shrink: 0; object-fit: cover;
      border: 1px solid #30363d;
    }
    .msg-avatar.bot-av {
      background: #58a6ff22; border-color: #58a6ff;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }

    .msg-bubble {
      padding: 12px 16px; border-radius: 12px;
      font-size: 14px; line-height: 1.6;
    }
    .msg.bot .msg-bubble {
      background: #161b22; border: 1px solid #30363d;
      color: #e6edf3; border-radius: 4px 12px 12px 12px;
    }
    .msg.user .msg-bubble {
      background: #58a6ff22; border: 1px solid #58a6ff44;
      color: #e6edf3; border-radius: 12px 4px 12px 12px;
    }

    .typing-indicator {
      display: flex; gap: 4px; align-items: center; padding: 4px 0;
    }
    .typing-indicator span {
      width: 6px; height: 6px; border-radius: 50%;
      background: #58a6ff; animation: bounce 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

    .suggestions {
      display: flex; gap: 8px; flex-wrap: wrap;
      padding: 0 20px 12px;
      max-width: 760px; width: 100%; margin: 0 auto;
    }
    .suggestion-btn {
      background: #161b22; border: 1px solid #30363d;
      color: #8b949e; font-size: 12px; padding: 6px 12px;
      border-radius: 20px; cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s; white-space: nowrap;
    }
    .suggestion-btn:hover { border-color: #58a6ff; color: #58a6ff; }

    .input-area {
      background: #161b22; border-top: 1px solid #30363d;
      padding: 16px 20px;
    }
    .input-inner {
      max-width: 760px; margin: 0 auto;
      display: flex; gap: 10px; align-items: center;
    }
    #chat-input {
      flex: 1; background: #0d1117;
      border: 1px solid #30363d; border-radius: 8px;
      color: #e6edf3; font-family: 'Inter', sans-serif;
      font-size: 14px; padding: 10px 16px;
      outline: none; transition: border-color 0.2s;
      resize: none; height: 44px; line-height: 1.4;
    }
    #chat-input:focus { border-color: #58a6ff; }
    #chat-input::placeholder { color: #6e7681; }
    #send-btn {
      background: #58a6ff; border: none;
      color: #0d1117; width: 44px; height: 44px;
      border-radius: 8px; cursor: pointer;
      font-size: 18px; transition: all 0.2s;
      flex-shrink: 0; display: flex;
      align-items: center; justify-content: center;
    }
    #send-btn:hover { background: #79b8ff; transform: scale(1.05); }
    #send-btn:disabled { background: #30363d; color: #6e7681; cursor: not-allowed; transform: none; }
  </style>
</head>
<body>
  <a href="index.html" class="back-btn">← back</a>

  <div class="chat-header">
    <img src="assets/images/profile.jpeg" class="chat-avatar" alt="Vedika"/>
    <div class="chat-header-info">
      <h2>Vedika's AI Portfolio Assistant</h2>
      <p><span class="online-dot"></span>online · ask me anything about Vedika</p>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="msg bot">
      <div class="msg-avatar bot-av">🤖</div>
      <div class="msg-bubble">
        Hey! I'm Vedika's AI portfolio assistant. I know everything about her skills, projects, experience, and achievements.<br/><br/>
        What would you like to know? 👇
      </div>
    </div>
  </div>

  <div class="suggestions" id="suggestions">
    <button class="suggestion-btn" onclick="sendSuggestion(this)">What are her strongest skills?</button>
    <button class="suggestion-btn" onclick="sendSuggestion(this)">Tell me about her best project</button>
    <button class="suggestion-btn" onclick="sendSuggestion(this)">Is she available for internships?</button>
    <button class="suggestion-btn" onclick="sendSuggestion(this)">What makes her stand out?</button>
  </div>

  <div class="input-area">
    <div class="input-inner">
      <textarea id="chat-input" placeholder="Ask anything about Vedika..." rows="1"></textarea>
      <button id="send-btn" onclick="sendMessage()">➤</button>
    </div>
  </div>

  <script>
    const SYSTEM_PROMPT = `You are an AI assistant for Vedika Kapoor's portfolio website. You answer questions about Vedika in a friendly, concise, and professional way. Always speak about Vedika in third person. Keep answers under 150 words unless asked for detail.

Here is everything you know about Vedika:

NAME: Vedika Kapoor
EDUCATION: B.Tech Computer Science (Blockchain Technology) at SRM Institute of Science and Technology, Chennai. GPA: 8.67/10. Jul 2023 – May 2027.
LOCATION: Chennai, Tamil Nadu, India. Open to remote opportunities worldwide.
EMAIL: vedikakapoor.work@gmail.com
PHONE: +91 9335315832
LINKEDIN: linkedin.com/in/vedika-kapoor-4a635a289
GITHUB: github.com/vedikakapoor27

SKILLS: Python, JavaScript, Java, C, C++, SQL, React.js, Node.js, Express, FastAPI, TensorFlow, Streamlit, Tailwind CSS, MongoDB, PostgreSQL, Elasticsearch, Kibana, Git, GitHub, Machine Learning, ChatGPT (structured use), Canva AI, Blockchain, zk-SNARKs, IPFS, Solidity.

PROJECTS:
1. SolarSavvy - Platform improving solar energy accessibility for low-income Indian homeowners. ML regression models estimate rooftop viability with ±12% error margin across 5 Indian states. Stack: Python, ML, Streamlit. Focus: sustainability + social impact.
2. AI API Monitor - Intelligent API observability platform detecting anomalies using Isolation Forest and forecasting degradation 15 min ahead with Prophet. Top 6 / 5000+ at Barclays Hack-O-Hire. Stack: FastAPI, MongoDB, Elasticsearch, React, Kibana.
3. University Dashboard - Full-stack classroom management platform with JWT auth, RBAC, 12 REST API endpoints. PERN stack. Deploying April 2026.
4. PathProof - Blockchain + zero-knowledge supply chain traceability. zk-SNARK Proof of Location, IPFS, smart contracts. Won 3rd place at Tech Genius 2K25.

EXPERIENCE:
1. Secretary, Computer Society of India (Aug 2025 - Present): Led 200+ participant hackathon, increased engagement 40%, used AI tools for insights.
2. Social Media & Communications Intern, Pledge a Smile Foundation (Jul-Aug 2024): Grew follower base 18% in 6 weeks, 30+ targeted posts.

ACHIEVEMENTS:
- Top 6 Finalist, Barclays Hack-O-Hire (Apr 2025) - from 5000+ applicants
- 3rd Runner Up, Tech Genius 2K25 (Sep 2025)
- GPA 8.67/10
- SolarSavvy 5-state ML pilot

AVAILABILITY: Actively seeking internships, especially in tech + social impact, sustainability, AI/ML, full-stack development. Open to remote international roles.

PERSONALITY: Analytical, socially driven, asks "what stops people?" not just "what can I build?". Thrives under pressure. Passionate about sustainability and social good.`;

    const messages = [];

    function addMessage(role, content) {
      const div = document.createElement('div');
      div.className = `msg ${role === 'user' ? 'user' : 'bot'}`;
      div.innerHTML = `
        <div class="msg-avatar ${role === 'user' ? '' : 'bot-av'}">
          ${role === 'user'
            ? '<img src="assets/images/profile.jpeg" style="width:32px;height:32px;border-radius:50%;object-fit:cover;border:1px solid #30363d;" />'
            : '🤖'}
        </div>
        <div class="msg-bubble">${content.replace(/\n/g, '<br/>')}</div>
      `;
      document.getElementById('messages').appendChild(div);
      div.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }

    function addTyping() {
      const div = document.createElement('div');
      div.className = 'msg bot'; div.id = 'typing-msg';
      div.innerHTML = `
        <div class="msg-avatar bot-av">🤖</div>
        <div class="msg-bubble">
          <div class="typing-indicator">
            <span></span><span></span><span></span>
          </div>
        </div>
      `;
      document.getElementById('messages').appendChild(div);
      div.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }

    function removeTyping() {
      const t = document.getElementById('typing-msg');
      if (t) t.remove();
    }

    function sendSuggestion(btn) {
      document.getElementById('chat-input').value = btn.textContent;
      document.getElementById('suggestions').style.display = 'none';
      sendMessage();
    }

    async function sendMessage() {
      const input = document.getElementById('chat-input');
      const btn = document.getElementById('send-btn');
      const text = input.value.trim();
      if (!text) return;

      input.value = '';
      btn.disabled = true;
      document.getElementById('suggestions').style.display = 'none';

      addMessage('user', text);
      messages.push({ role: 'user', content: text });

      addTyping();

      try {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1000,
            system: SYSTEM_PROMPT,
            messages: messages
          })
        });

        const data = await res.json();
        removeTyping();

        const reply = data.content?.[0]?.text || "Sorry, I couldn't fetch a response. Please try again!";
        addMessage('bot', reply);
        messages.push({ role: 'assistant', content: reply });

      } catch(e) {
        removeTyping();
        addMessage('bot', "I'm having trouble connecting right now. You can reach Vedika directly at vedikakapoor.work@gmail.com 📧");
      }

      btn.disabled = false;
      input.focus();
    }

    document.getElementById('chat-input').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
