<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 | Vedika Kapoor</title>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      font-family: 'Fira Code', monospace;
      height: 100vh;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .container { text-align: center; position: relative; z-index: 1; }

    .glitch {
      font-size: clamp(80px, 18vw, 160px);
      font-weight: 600;
      color: #e6edf3;
      position: relative;
      display: inline-block;
      animation: glitch-main 3s infinite;
    }
    .glitch::before, .glitch::after {
      content: '404';
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
    }
    .glitch::before {
      color: #58a6ff;
      animation: glitch-1 3s infinite;
      clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
    }
    .glitch::after {
      color: #f78166;
      animation: glitch-2 3s infinite;
      clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
    }
    @keyframes glitch-main {
      0%,90%,100% { transform: none; }
      91% { transform: skew(-1deg); }
      93% { transform: skew(1deg); }
    }
    @keyframes glitch-1 {
      0%,90%,100% { transform: none; opacity: 0; }
      91% { transform: translate(-4px, -2px); opacity: 0.8; }
      93% { transform: translate(4px, 2px); opacity: 0.8; }
      95% { transform: none; opacity: 0; }
    }
    @keyframes glitch-2 {
      0%,90%,100% { transform: none; opacity: 0; }
      92% { transform: translate(4px, 2px); opacity: 0.8; }
      94% { transform: translate(-4px, -2px); opacity: 0.8; }
      96% { transform: none; opacity: 0; }
    }

    .subtitle { font-size: 16px; color: #8b949e; margin: 16px 0 8px; }
    .code-line { font-size: 13px; color: #58a6ff; margin-bottom: 32px; }
    .code-line span { color: #3fb950; }

    .scanlines {
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px
      );
      pointer-events: none; z-index: 0;
    }

    .btn-home {
      display: inline-block;
      padding: 12px 28px;
      background: transparent;
      border: 1px solid #58a6ff;
      color: #58a6ff;
      text-decoration: none;
      border-radius: 6px;
      font-family: 'Fira Code', monospace;
      font-size: 13px;
      transition: all 0.2s;
      margin: 0 6px;
    }
    .btn-home:hover { background: rgba(88,166,255,0.1); transform: translateY(-2px); }

    .noise {
      position: fixed; inset: 0;
      opacity: 0.03; z-index: 0;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    }

    .terminal-msg {
      font-size: 12px; color: #6e7681;
      margin-top: 24px; line-height: 1.8;
    }
    .terminal-msg span { color: #f78166; }
  </style>
</head>
<body>
  <div class="scanlines"></div>
  <div class="noise"></div>
  <div class="container">
    <div class="glitch">404</div>
    <p class="subtitle">page not found</p>
    <p class="code-line">
      Error: <span>PageNotFoundException</span> at line ??
    </p>
    <a href="index.html" class="btn-home">cd ~/ home</a>
    <a href="terminal.html" class="btn-home">open terminal</a>
    <p class="terminal-msg">
      <span>$</span> find / -name "this-page" 2>/dev/null<br/>
      <span>$</span> find: no results. this page does not exist.
    </p>
  </div>
</body>
</html>
